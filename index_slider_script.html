    <!-- Fetch API data and generate slider HTML BEFORE build.min.js initializes -->
    <script>
      (async function() {
        console.log('Fetching API data...');
        
        try {
          const projects = await window.fetchProjects();
          
          if (projects.length > 0) {
            const sliderProjects = projects.slice(0, 6);
            window.__sliderProjects = sliderProjects;
            
            console.log(`Loaded ${sliderProjects.length} projects for slider`);
            generateSliderHTML(sliderProjects);
            window.__sliderHTMLReady = true;
            console.log('Slider HTML ready - build.min.js will handle navigation');
          }
        } catch (err) {
          console.log('API failed, using fallback');
          window.__sliderHTMLReady = true;
        }
        
        function generateSliderHTML(projects) {
          console.log('Generating slider HTML for', projects.length, 'projects');
          
          const counter = document.querySelector('.box--home__info__counter');
          if (counter) {
            counter.innerHTML = `<span>1</span>/${projects.length}`;
          }
          
          const listContainer = document.querySelector('.list--home');
          if (listContainer) {
            const existingItems = listContainer.querySelectorAll('li');
            existingItems.forEach(item => item.remove());
            
            projects.forEach((project, index) => {
              const li = document.createElement('li');
              if (index === 0) li.classList.add('is-active');
              
              const link = project.link || `works/project-detail.html#id=${project.id}`;
              
              li.innerHTML = `
                <a href="${link}" class="js-change-video">
                  <h2>${project.title}</h2>
                  <p>${project.client_short || project.client}</p>
                  <p>${project.classification}</p>
                </a>
              `;
              
              listContainer.appendChild(li);
            });
            
            console.log('Generated', projects.length, 'list items with .js-change-video');
          }
          
          const mainVideo = document.querySelector('.js-main-video');
          if (mainVideo && projects[0]) {
            const videoUrl = projects[0].video_url || 'assets/video/video1.mp4';
            mainVideo.setAttribute('data-src', videoUrl);
            mainVideo.src = videoUrl;
            console.log('Set main video:', videoUrl);
          }
          
          const playerVideo = document.querySelector('.player-animated-player');
          if (playerVideo && projects[0]) {
            const videoUrl = projects[0].video_url || 'assets/video/video1.mp4';
            playerVideo.setAttribute('data-src', videoUrl);
            playerVideo.src = videoUrl;
            console.log('Set player video:', videoUrl);
          }
          
          const mainLink = document.querySelector('.box--home__link');
          if (mainLink && projects[0]) {
            mainLink.href = projects[0].link || `works/project-detail.html#id=${projects[0].id}`;
          }
          
          const mobileLink = document.querySelector('.mobile-link');
          if (mobileLink && projects[0]) {
            mobileLink.href = projects[0].link || `works/project-detail.html#id=${projects[0].id}`;
          }
          
          const cursorText = document.querySelector('.cursor-main-text');
          if (cursorText && projects[0]) {
            cursorText.textContent = `open ${projects[0].title}`;
          }
          
          console.log('Slider HTML generated - build.min.js will handle navigation');
        }
      })();
    </script>
