  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- GSAP Library -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <style>
    /* Monument Extended Font */
    @font-face {
      font-family: 'Monument Extended';
      src: local('Monument Extended'), local('MonumentExtended-Regular');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Monument Extended';
      src: local('Monument Extended Bold'), local('MonumentExtended-Bold');
      font-weight: 700;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Monument Extended', 'Montserrat', sans-serif;
      font-weight: 700;
      background: #000;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Animation Container */
    .intro-container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 16:9 Frame (Logo Frame) - Left-aligned for diagonal layout */
    .frame-16-9 {
      position: absolute;
      width: 700px;
      height: 393.75px;
      /* 16:9 ratio */
      border: 5px solid #fff;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      /* Left-align for diagonal effect */
      justify-content: center;
      padding: 50px 60px;
      z-index: 10;
    }

    /* SVG Border overlay */
    .frame-border-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      /* Hidden by default, shown in animation 8 */
    }

    .border-rect {
      stroke-dasharray: 2500;
      stroke-dashoffset: 2500;
    }

    /* Text inside frame - diagonal staircase layout (left-aligned, thin font) */
    .frame-text {
      text-align: left;
      line-height: 1.05;
      font-size: 56px;
      font-weight: 700;
      /* Bold for Monument Extended style */
      font-family: 'Monument Extended', 'Montserrat', sans-serif;
      letter-spacing: 0.08em;
      color: #fff;
      position: relative;
      z-index: 2;
    }

    .frame-text .line {
      display: block;
      opacity: 1 !important;
      color: #fff;
    }

    /* Diagonal staircase layout - precise letter alignment */
    .frame-text .line-1 {
      /* DUBAI - top left, no indent */
      margin-bottom: 2px;
      padding-left: 0;
    }

    .frame-text .line-2 {
      /* FILM - F aligns with U from DUBAI */
      margin-bottom: 2px;
      padding-left: 80px;
      /* F aligns under U */
    }

    .frame-text .line-3 {
      /* MAKER - M aligns with I from FILM */
      padding-left: 160px;
      /* M aligns under I */
    }

    /* Single line text (morphed state) */
    .single-line-text {
      position: absolute;
      font-size: 60px;
      font-weight: 700;
      font-family: 'Monument Extended', 'Montserrat', sans-serif;
      letter-spacing: 0.02em;
      white-space: nowrap;
      opacity: 0;
      z-index: 5;
    }

    /* Controls */
    .controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 100;
    }

    .btn {
      padding: 12px 24px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #ddd;
      transform: scale(1.05);
    }

    .btn:active {
      transform: scale(0.95);
    }

    /* Info Panel */
    .info-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.6;
      max-width: 300px;
      z-index: 100;
    }

    .info-panel h3 {
      font-size: 14px;
      margin-bottom: 10px;
      color: #fff;
    }

    .info-panel p {
      color: #ccc;
      margin-bottom: 8px;
    }

    .info-panel code {
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      color: #fff;
    }

    /* Animation Selector */
    .animation-selector {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      padding: 20px;
      padding-right: 15px;
      border-radius: 8px;
      z-index: 100;
      max-height: calc(100vh - 100px);
      width: 300px;
      overflow-y: auto;
      overflow-x: hidden;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    /* Custom Scrollbar - Enhanced Visibility */
    .animation-selector::-webkit-scrollbar {
      width: 12px;
    }

    .animation-selector::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
      margin: 5px 0;
    }

    .animation-selector::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.7);
      border-radius: 6px;
      border: 2px solid rgba(0, 0, 0, 0.3);
    }

    .animation-selector::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.9);
    }

    /* Fallback for Firefox */
    .animation-selector {
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.7) rgba(0, 0, 0, 0.3);
    }

    .animation-selector h3 {
      font-size: 14px;
      margin-bottom: 10px;
      color: #fff;
      position: sticky;
      top: -20px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      padding: 10px 0;
      margin: -20px -20px 15px -20px;
      padding-left: 20px;
      padding-right: 20px;
      border-radius: 8px 8px 0 0;
      z-index: 10;
    }

    .scroll-hint {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      margin-top: -5px;
      margin-bottom: 10px;
      font-weight: 400;
    }

    .animation-option {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      padding: 8px;
      border-radius: 4px;
      transition: background 0.2s ease;
    }

    .animation-option:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .animation-option input[type="radio"] {
      cursor: pointer;
    }

    .animation-option label {
      cursor: pointer;
      font-size: 13px;
      color: #fff;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .frame-16-9 {
        width: 320px;
        height: 180px;
        padding: 20px 25px;
        border: 3px solid #fff;
        border-radius: 8px;
      }

      .frame-text {
        font-size: 28px;
      }

      .frame-text .line-2 {
        padding-left: 40px;
      }

      .frame-text .line-3 {
        padding-left: 80px;
      }

      .single-line-text {
        font-size: 40px;
      }

      .info-panel {
        display: none;
      }

      .animation-selector {
        position: fixed;
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: 380px;
        max-height: 60vh;
        border-radius: 20px 20px 0 0;
        border: none;
        border-top: 2px solid rgba(255, 255, 255, 0.2);
        transform: translateY(330px);
        /* Collapsed showing 50px header */
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        background: rgba(10, 10, 10, 0.95);
        z-index: 200;
        padding: 15px;
        margin: 0;
        box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.5);
      }

      .animation-selector h3 {
        margin: -15px -15px 15px -15px;
        padding: 15px;
        border-radius: 20px 20px 0 0;
        cursor: pointer;
        text-align: center;
        background: rgba(255, 255, 255, 0.1);
        position: relative;
      }

      /* Handle bar for sliding drawer */
      .animation-selector h3::before {
        content: '';
        position: absolute;
        top: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 4px;
        background: rgba(255, 255, 255, 0.4);
        border-radius: 2px;
      }

      .animation-selector.open {
        transform: translateY(0);
      }

      .controls {
        top: 20px;
        bottom: auto;
        z-index: 150;
      }
    }

    @media (max-width: 480px) {
      .frame-16-9 {
        width: 280px;
        height: 158px;
        padding: 15px 20px;
      }

      }

      .frame-text .line-3 {
        padding-left: 60px;
      }

      .single-line-text {
        font-size: 32px;
      }
    }
  </style>
</head>

    // Animation 86: Morph D → Single Line
    function animation86() {
      console.log('🎬 Animation 86: Morph D → Single Line');

      const text = 'DUBAIFILMMAKER';
      singleLineText.innerHTML = '';
      text.split('').forEach((ch) => {
        const span = document.createElement('span');
        span.textContent = ch;
        span.className = 'letter';
        span.style.display = 'inline-block';
        span.style.opacity = '0';
        singleLineText.appendChild(span);
      });
      const finalLetters = singleLineText.querySelectorAll('.letter');

      // Ensure stacked letters are wrapped in <span class="letter">
      if (document.querySelectorAll('.frame-text .line .letter').length === 0) {
        document.querySelectorAll('.frame-text .line').forEach(line => {
          const chars = line.textContent.split('');
          line.textContent = '';
          chars.forEach(c => {
            const s = document.createElement('span');
            s.textContent = c;
            s.className = 'letter';
            line.appendChild(s);
          });
        });
      }
      const lettersInFrame = document.querySelectorAll('.frame-text .line .letter');

      const tl = gsap.timeline({ onComplete: () => console.log('✅ Animation 86 complete') });

      // Hide the frame
      tl.set(frame, { opacity: 0 }, 0);
      // Keep stacked letters visible but small
      tl.set(lettersInFrame, { opacity: 1, scale: 0.9 }, 0);
      // Prepare single-line container
      tl.set(singleLineText, { opacity: 1 }, 0);

      // Morph: each stacked letter slides to its final position
      lettersInFrame.forEach((src, idx) => {
        const tgt = finalLetters[idx];
        if (!tgt) return;
        const srcRect = src.getBoundingClientRect();
        const tgtRect = tgt.getBoundingClientRect();
        const dx = tgtRect.left - srcRect.left;
        const dy = tgtRect.top - srcRect.top;

        tl.to(src, {
          x: dx,
          y: dy,
          scale: 0.8,
          opacity: 0,
          duration: 0.9,
          ease: 'power2.out'
        }, 0.2 + idx * 0.03);
      });

      // Reveal final single-line letters
      tl.to(finalLetters, {
        opacity: 1,
        scale: 1,
        duration: 0.6,
        ease: 'back.out(2)',
        stagger: { each: 0.04, from: 'center' }
      }, '-=0.3');

      durationSpan.textContent = '2.2s';
      return tl;
    }

    // Reset animation
    function resetAnimation() {
      const borderRect = document.querySelector('.border-rect');
      const borderSvg = document.querySelector('.frame-border-svg');

      if (currentTimeline) {
        currentTimeline.kill();
      }

      // Reset to initial state - SHOW single line text only (no frame)
      gsap.set(frame, {
        scale: 1,
        opacity: 0,  // Hide frame
        rotation: 0,
        scaleX: 1,
        width: 700,
        height: 393.75,
        borderRadius: 20
      });
      gsap.set(lines, {
        opacity: 0,  // Hide stacked text
        x: 0,
        y: 0,
        letterSpacing: '0.08em'
      });
      gsap.set(singleLineText, {
        opacity: 1,  // Show single line text
        scale: 1,
        y: 0,
        rotation: 0
      });
      gsap.set(borderSvg, { opacity: 0 });
      gsap.set(borderRect, {
        strokeDashoffset: 2500,
        opacity: 0
      });
      singleLineText.innerHTML = 'DUBAIFILMMAKER';

      console.log('🔄 Animation reset - showing DUBAIFILMMAKER (single line)');
    }

    // Event listeners
    playBtn.addEventListener('click', playAnimation);
    resetBtn.addEventListener('click', resetAnimation);

    // Toggle mobile drawer on header tap
    const selectorHeader = document.querySelector('.animation-selector h3');
    const selectorPanel = document.querySelector('.animation-selector');

    selectorHeader.addEventListener('click', () => {
      if (window.innerWidth <= 768) {
        selectorPanel.classList.toggle('open');
      }
    });

    animationRadios.forEach(radio => {
      radio.addEventListener('change', () => {
        resetAnimation();
        // Collapse mobile drawer when option selected
        if (window.innerWidth <= 768) {
          selectorPanel.classList.remove('open');
        }
      });
    });

    // Smooth scroll to selected animation option
    animationRadios.forEach((radio, index) => {
      radio.addEventListener('focus', () => {
        const option = radio.closest('.animation-option');
        if (option) {
          option.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      });
    });

    // Initialize - Reset to show single line text
    resetAnimation();
    console.log('✓ Ready to test animations');
    console.log('📋 Total animations available: 86');
    console.log('📜 Scroll the left panel to see all options');
  </script>
