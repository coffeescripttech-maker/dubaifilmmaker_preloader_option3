    <style>
      /* Fix video thumbnail aspect ratio - prevent squishing */
      .bloc-projects-listing
        .box--work__video.video-wrapper.has-poster
        img.video-img-poster {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
        object-position: center !important;
      }

      /* Ensure video wrapper maintains proper dimensions */
      .bloc-projects-listing .box--work__video.video-wrapper {
        position: relative !important;
        overflow: hidden !important;
      }

      /* Header styles loaded from data/header.json - prevent FOUC */

      /* On homepage FIRST VISIT ONLY, keep header logo hidden until intro completes */
      /* Disabled - logo now visible during intro for size sync */
      /* body.template-homepage:not(.intro-ended) .header__logo {
        opacity: 0 !important;
        visibility: hidden !important;
      } */

      /* Prevent initial flash — show immediately after render */
      .header__logo {
        opacity: 0 !important;
      }

      /* After intro ends on homepage, show header logo with quick fade */
      body.template-homepage.intro-ended .header__logo {
        opacity: 1 !important;
        visibility: visible !important;
      }

      /* CRITICAL OVERRIDE: If intro-ended exists, ALWAYS show logo (handles navigation back) */
      body.intro-ended .header__logo,
      html.intro-ended .header__logo {
        opacity: 1 !important;
        visibility: visible !important;
        display: block !important;
      }

      /* NUCLEAR OPTION: Force visibility with highest specificity */
      html body.intro-ended .header__logo,
      html.intro-ended body .header__logo {
        opacity: 1 !important;
        visibility: visible !important;
        display: block !important;
      }

      /* On other pages, show logo normally */
      body:not(.template-homepage) .header__logo.loaded {
        opacity: 1;
      }

      /* CRITICAL: Ensure main video is visible after intro */
      .box--home__wrapper .js-main-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.3s ease,
          visibility 0.3s ease;
      }

      .box--home__wrapper .js-main-video.visible,
      html.intro-ended .box--home__wrapper .js-main-video.visible {
        opacity: 1 !important;
        visibility: visible !important;
        z-index: 1;
      }

      .box--home__wrapper .js-main-video.loaded,
      html.intro-ended .box--home__wrapper .js-main-video.loaded {
        opacity: 1 !important;
        visibility: visible !important;
      }

      /* Slider wrapper - ensures pagination is positioned at bottom */
      .slider-wrapper {
        display: flex;
        flex-direction: column;
        width: 100%;
      }

      /* Force slider wrapper visibility on desktop */
      @media (min-width: 768px) {
        .slider-wrapper {
          display: flex !important;
          visibility: visible !important;
          opacity: 1 !important;
          min-height: 50px !important;
        }

        /* Force list visibility on desktop - HIDE the text list */
        .list--home {
          display: none !important;
        }

        /* Show arrows on desktop like mobile */
        .box--home__buttons-mobile {
          display: flex !important;
          opacity: 1 !important;
          pointer-events: auto !important;
          position: relative !important;
          bottom: auto !important;
          right: auto !important;
          margin-top: 1rem !important;
          justify-content: center !important;
        }

        .box--home__buttons-mobile .mobile-link {
          display: none !important;
          /* Hide "view project" button on desktop */
        }

        .box--home__buttons-mobile .arrows {
          display: flex !important;
          gap: 1rem !important;
        }
      }

      /* Homepage slider loading state */
      #homepage-slider {
        transition: opacity 0.3s ease;
        flex: 1;
      }

      /* Timeline positioning */
      .box--home__timeline {
        width: 100%;
        margin-top: 0.5rem;
      }

      /* Main video wrapper loading state */
      #homepage-main-video-wrapper {
        transition: opacity 0.3s ease;
        background: #1a1a1a;
      }

      /* Smooth fade-in for dynamic content */
      .box--home__link {
        transition:
          opacity 0.3s ease,
          pointer-events 0.3s ease;
      }

      .mobile-link {
        transition:
          opacity 0.3s ease,
          pointer-events 0.3s ease;
      }

      /* Arrow buttons styling - Mobile only */
      .box--home__buttons-mobile {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        justify-content: space-between;
        margin-top: 1rem;
        padding: 0 0.75rem;
      }

      .box--home__buttons-mobile .mobile-link {
        flex: 1;
        padding: 0.5rem 0.75rem;
        text-align: center;
        font-size: 0.75rem;
        border: 1px solid #fff;
        background: transparent;
        color: #fff;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .box--home__buttons-mobile .mobile-link:hover {
        background: #fff;
        color: #000;
      }

      .box--home__buttons-mobile .arrows {
        display: flex;
        gap: 0.5rem;
      }

      .box--home__buttons-mobile .arrow-prev,
      .box--home__buttons-mobile .arrow-next {
        width: 36px;
        height: 36px;
        border: 1px solid #fff;
        background: transparent;
        color: #fff;
        cursor: pointer;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
      }

      .box--home__buttons-mobile .arrow-prev:hover,
      .box--home__buttons-mobile .arrow-next:hover {
        background: #fff;
        color: #000;
        transform: scale(1.1);
      }

      @media (min-width: 768px) {
        .box--home__buttons-mobile {
          display: none;
        }

      header.filter-active .projects-nav {

      /* Conditional: Force projects-nav to always be visible (controlled by config.json) */
      html.projects-nav-always-visible .projects-nav,
      html.projects-nav-always-visible .projects-nav .list--cat,
      html.projects-nav-always-visible .projects-nav .list--cat li,
      html.projects-nav-always-visible .projects-nav .list--cat li a {

      /* Ensure list items are inline for horizontal layout */

        text-overflow: clip !important;

      html.projects-nav-always-visible

      @media (max-width: 767px) {

        html.projects-nav-always-visible .projects-nav .list--cat {

        .intro-anim-surwrapper {
          left: 0 !important;
          top: 0 !important;

          height: 100% !important;
          background: #0000;
        }
        .intro-anim-wrapper {
          left: 0 !important;
          top: 0 !important;
          width: 100% !important;
          height: 100% !important;
          transform: none !important;
          background: #0000;

          height: 100% !important;
          background: #0000;
          transform: none;
        }
        .intro-anim.is-visible {
          transform: none;
        }
      }
      /* --- INTRO SCALE CONTROL ---
       Adjust the number below to zoom in/out.
       >1 = bigger (zoomed in),  <1 = smaller (see more edges)
       Set it here, save, and refresh. */
      :root {
        --intro-scale: 1;
      }
      /* Dark background matching the animation's solid layer so gaps are invisible */
      .bloc-intro {
        background: #0000 !important;
        width: 100vw !important;
        height: 100dvh !important;
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;

    <!-- Hybrid Slider Script: Inline generation + Preload detection -->
    <script>
      // DEBUG flag - set to false in production to reduce console logs
      const DEBUG = false;

      // Helper functions - defined globally so they can be reused
      function generateListItems(projects) {
        const listContainer = document.querySelector('.list--home');
        if (!listContainer) return;

        // Generate cursor player wrapper with videos
        let cursorPlayerHTML = `
          <div class="cursor-player-animated js-cursor-player-animated">
            <div class="mooving-elements players-wrapper is-player" data-friction="7">
        `;

        projects.forEach(project => {
          cursorPlayerHTML += `
              <video
                class="js-video player-animated-player"
                data-src="${project.video_url}"
                playsinline
                loop
                muted
              ></video>
          `;
        });

        cursorPlayerHTML += `
            </div>
          </div>
        `;

        // Generate list items
        let listItemsHTML = '';
        projects.forEach((project, index) => {
          const link = project.link || `works/project-detail#id=${project.id}`;
          const displayClient = project.client_short || project.client;

          listItemsHTML += `
            <li class="${index === 0 ? 'is-active' : ''}" data-project-index="${index}">
              <a href="${link}" class="js-change-video">
              
                <p>${displayClient}</p>
                  <h2>${project.title}</h2>
                <p>${project.classification}</p>
              </a>
            </li>
          `;
        });

        // Insert cursor player + list items
        listContainer.innerHTML = cursorPlayerHTML + listItemsHTML;

        // Dispatch event for cursor player re-initialization (no video loading yet - deferred to after intro)
        setTimeout(() => {

        mobileArrowPrev.forEach(arrow => {
          arrow.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            console.log('← Prev arrow clicked');
            currentlyPlaying--;
            if (currentlyPlaying < minPlaying) currentlyPlaying = maxPlaying;
            console.log(`currentlyPlaying: ${currentlyPlaying}`);
            switchToVideo(currentlyPlaying);
          });
        });

        // onNextClick - handle all next arrows (mobile + desktop)
        mobileArrowNext.forEach(arrow => {
          arrow.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            console.log('→ Next arrow clicked');
            currentlyPlaying++;
            if (currentlyPlaying > maxPlaying) currentlyPlaying = minPlaying;
            console.log(`currentlyPlaying: ${currentlyPlaying}`);
            switchToVideo(currentlyPlaying);
          });
        });

        console.log('✓ Video switching, timeline, and arrows re-initialized');

        // Apply arrow visibility based on config (arrows are dynamically loaded)
        var arrowEls = document.querySelectorAll('.arrow-prev, .arrow-next, .slider-nav-arrow, .box--home__buttons-mobile .arrows');
        if (window.__swipeNavigationEnabled) {
          arrowEls.forEach(function(el) { el.style.setProperty('display', 'none', 'important'); });
          console.log('✓ Arrows hidden (swipe mode)');
        } else {
          arrowEls.forEach(function(el) { el.style.removeProperty('display'); });
          console.log('✓ Arrows visible (arrow mode)');
        }

        // Touch swipe navigation (only when config says so)
        if (window.__swipeNavigationEnabled) {
          var swipeTarget = document.querySelector('#homepage-main-video-wrapper, .box--home__wrapper');
          if (swipeTarget) {
            var touchStartX = 0;
            var touchStartY = 0;
            var swipeHandled = false;

            swipeTarget.addEventListener('touchstart', function (e) {
              var touch = e.touches[0];
              touchStartX = touch.clientX;
              touchStartY = touch.clientY;
              swipeHandled = false;
            }, { passive: true });

            swipeTarget.addEventListener('touchend', function (e) {
              if (swipeHandled) return;
              var touch = e.changedTouches[0];
              var diffX = touch.clientX - touchStartX;
              var diffY = touch.clientY - touchStartY;

              // Only trigger if horizontal swipe is stronger than vertical scroll
              if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 40) {
                swipeHandled = true;
                if (diffX < 0) {
                  // Swipe left → next
                  console.log('👆 Swipe left → next');
                  currentlyPlaying++;
                  if (currentlyPlaying > maxPlaying) currentlyPlaying = minPlaying;
                  switchToVideo(currentlyPlaying);
                } else {
                  // Swipe right → prev
                  console.log('👆 Swipe right → prev');
                  currentlyPlaying--;
                  if (currentlyPlaying < minPlaying) currentlyPlaying = maxPlaying;
                  switchToVideo(currentlyPlaying);
                }
              }
            }, { passive: true });
            console.log('✓ Touch swipe initialized on video wrapper');
          } else {
            console.warn('⚠ Touch swipe target not found');
          }
        } else {
          console.log('ℹ️ Swipe navigation disabled by config — arrows are visible');
        }
      }); // Removed { once: true } so this runs every time homepage is loaded

      // Category filtering - replicate build.min.js logic
      window.addEventListener('projects-rendered', function () {
        console.log('🔄 Initializing category filtering...');

        const filterLinks = document.querySelectorAll('.js-filter-cat');
        const worksList = document.querySelector('.list--works');
        const header = document.querySelector('header.header');

        const allWorks = worksList.querySelectorAll('.box--work');

        console.log({ allWorks });
        if (!filterLinks.length || !worksList) {
          console.warn('Filter links or works list not found');
          return;
        }

        // Store current filter state
        let currentFilter = '*';

        // Add click handlers to filter links
        filterLinks.forEach(link => {
          link.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();

            const selectedCategory = this.getAttribute('data-cat');
            console.log(`Filter clicked: ${selectedCategory}`);

            // Update active state on filter links
            filterLinks.forEach(l => l.classList.remove('is-active'));
            this.classList.add('is-active');

            // Store current filter
            currentFilter = selectedCategory;

            // Get all work items
            const allWorks = worksList.querySelectorAll('.box--work');
            console.log(
              `Filtering ${allWorks.length} projects by category: ${selectedCategory}`
            );

            console.log({ allWorks });
            // Filter logic: show items matching filter or if filter is "*" (all)
            allWorks.forEach(work => {
              const workCategory = work.getAttribute('data-cat');

              // Case-insensitive comparison
              const matches =
                selectedCategory === '*' ||
                (workCategory &&
                  workCategory.toLowerCase() ===
                    selectedCategory.toLowerCase());

              if (matches) {
                work.classList.remove('hidden');
                console.log(
                  `✓ Showing: ${work.querySelector('h2')?.textContent || 'Unknown'} (${workCategory})`
                );
              } else {
                work.classList.add('hidden');
                console.log(
                  `✗ Hiding: ${work.querySelector('h2')?.textContent || 'Unknown'} (${workCategory})`
                );
              }
            });

            // Force header to stay in "on-works-section" state when filtering is active
            // This ensures projects-nav remains visible even with fewer projects
            if (header) {
              if (selectedCategory === '*') {
                // "All" filter - let normal scroll behavior control visibility
                header.classList.remove('filter-active');
                console.log(
                  '✓ Removed filter-active class - normal scroll behavior'
                );
              } else {
                // Specific filter active - force projects-nav to stay visible
                header.classList.add('on-works-section', 'filter-active');
                console.log(
                  '✓ Added filter-active class - projects-nav forced visible'
                );
              }
            }

            console.log(
              `✓ Filtering complete - showing projects with category: ${selectedCategory}`
            );
          });
        });

        console.log('✓ Category filtering initialized');

        // Override scroll behavior to maintain projects-nav visibility during filtering
        let originalScrollHandler = null;

        // Store reference to prevent scroll from hiding projects-nav when filter is active
        function preventScrollHide() {
          const header = document.querySelector('header.header');
          if (header && header.classList.contains('filter-active')) {
            // Force on-works-section to stay active during filtering
            if (!header.classList.contains('on-works-section')) {
              header.classList.add('on-works-section');
              console.log('✓ Maintained on-works-section during filtering');
            }
          }
        }

        // Add scroll listener to maintain filter visibility
        window.addEventListener('scroll', preventScrollHide);

        console.log('✓ Scroll override for filtering initialized');
      });
    </script>

    <script src="assets/js/app-init.js"></script>
    <script src="assets/js/site-config.js"></script>
  </body>
